<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pobreflix - Cadastrar Conta</title>
    <style>
        body { 
            background: #141414; 
            color: white; 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .cadastro-box { 
            background: rgba(0, 0, 0, 0.75); 
            padding: 60px; 
            border-radius: 4px; 
            width: 300px; 
            text-align: center; 
        }
        h2 { 
            margin-bottom: 20px; 
            font-size: 32px; 
            color: #e50914; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: none; 
            background: #333; 
            color: white; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #e50914; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
        }
        a { 
            color: #b3b3b3; 
            text-decoration: none; 
            font-size: 14px; 
            display: block; 
            margin-top: 15px; 
        }
    </style>
</head>
<body>
    <div class="cadastro-box">
        <h2>Criar Conta</h2>
        <form action="/cadastro" method="POST">
            <input type="email" name="email" placeholder="Digite seu E-mail" required>
            <input type="password" name="senha" placeholder="Crie uma Senha" required>
            <button type="submit">Cadastrar Conta</button>
        </form>
        <a href="/login">Já tem uma conta? Entre por aqui.</a>
    </div>
</body>
</html>
