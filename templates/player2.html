<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pobrefix - {{ titulo }}</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: sans-serif; 
        }

        .btn-voltar { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 100; 
            background: rgba(0,0,0,0.7); 
            color: white; 
            padding: 12px 25px; 
            text-decoration: none; 
            border-radius: 30px; 
            font-weight: bold; 
            border: 1px solid #444; 
        }

        .video-wrapper { 
            width: 100vw; 
            height: 100vh; 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
        }
        
        video, iframe { 
            width: 100%; 
            height: 100%; 
            max-width: 100vw;
            max-height: 100vh;
            border: none; 
            object-fit: contain; 
        }
    </style>
</head>
<body>

    <a href="#" class="btn-voltar" onclick="window.history.back(); return false;">← Voltar</a>

    <div class="video-wrapper" id="videoContainer">
        
        <video id="meuVideo" playsinline autoplay controls>
            <source src="" type="video/mp4">
            Seu navegador não suporta vídeos.
        </video>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let urlInicial = "{{ url_video }}";
            let videoElement = document.getElementById("meuVideo");
            let sourceElement = videoElement.querySelector("source");

            // 1. Se o vídeo for Local/Offline (Salvo na sua pasta static)
            if (urlInicial.startsWith("/static") || urlInicial.startsWith("static")) {
                // Garante a barra correta no início do caminho
                let caminhoLimpo = urlInicial.startsWith("/") ? urlInicial : "/" + urlInicial;
                sourceElement.src = caminhoLimpo;
                videoElement.load();
                console.log("🎥 Rodando vídeo local offline: " + caminhoLimpo);
            } 
            // 2. Se for Link Externo (Telegram ou YouTube de Usuários)
            else {
                console.log("📡 Link externo detectado. Solicitando extração para o Python: " + urlInicial);
                
                fetch('/gerar_link_direto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInicial })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.url) {
                        sourceElement.src = data.url;
                        videoElement.load();
                        videoElement.play().catch(e => console.log("Autoplay bloqueado pelo navegador, aguardando clique."));
                        console.log("✅ Stream injetado com sucesso no player nativo!");
                    } else {
                        alert("Erro ao quebrar o link do vídeo: " + (data.error || "Desconhecido"));
                    }
                })
                .catch(err => {
                    console.error("Erro na comunicação com o servidor:", err);
                    alert("Não foi possível conectar ao backend do Pobreflix.");
                });
            }
        });
    </script>
</body>
</html>
